name: Manjubinha - Analises Automaticas

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  analisar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install requests pypdf beautifulsoup4 google-auth
      - name: Rodar analises
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_USER:        ${{ secrets.WP_USER }}
          WP_APP_PASS:    ${{ secrets.WP_APP_PASS }}
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
        run: python -u analises.py
      - name: Salvar controle e ranking
        run: |
          git config user.name "Manjubinha Bot"
          git config user.email "bot@manjubinha.com"
          git add controle_docs.json ranking.json
          git diff --staged --quiet || git commit -m "Auto: $(date '+%Y-%m-%d %H:%M')"
          git push
