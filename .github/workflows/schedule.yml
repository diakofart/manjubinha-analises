name: Manjubinha — Análises Automáticas

on:
  schedule:
    - cron: '0 11 * * 2'   # Terça 08h BRT
    - cron: '0 11 * * 5'   # Sexta 08h BRT
  workflow_dispatch:

jobs:
  analisar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests pypdf

      - name: Rodar análises
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_TOKEN:       ${{ secrets.WP_TOKEN }}
        run: python analises.py

      - name: Salvar controle e ranking atualizados
        run: |
          git config user.name "Manjubinha Bot"
          git config user.email "bot@manjubinha.com"
          git add controle_docs.json ranking.json
          git diff --staged --quiet || git commit -m "Auto: $(date '+%Y-%m-%d')"
          git push
