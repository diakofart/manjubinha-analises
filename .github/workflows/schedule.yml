name: "Manjubinha — Análises Automáticas"

on:
  schedule:
    - cron: "0 12 * * 2"
    - cron: "0 12 * * 5"
  workflow_dispatch:

jobs:
  analisar:
    runs-on: ubuntu-latest
    name: analisar

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar análises
        run: python analises.py
        continue-on-error: true
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Publicar pagina de ranking
        run: python publicar_ranking.py
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}

      - name: Salvar controle e ranking atualizados
        run: |
          git config user.name "ManjubinhaInvestidor"
          git config user.email "contato@manjubinhainvestidor.com.br"
          git add controle_docs.json ranking.json
          git diff --cached --quiet || git commit -m "Auto: $(date -u '+%Y-%m-%d')"
          git push
