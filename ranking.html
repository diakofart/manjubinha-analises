<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Manjubinha</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#222;padding:0}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem}
.tab{padding:7px 22px;border:1px solid #d0d0d0;border-radius:8px;background:transparent;font-size:14px;cursor:pointer;color:#666;transition:all .15s}
.tab.active{background:#D95218;color:#fff;border-color:#D95218;font-weight:500}
.legend{display:flex;gap:18px;margin-bottom:1rem;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:#888}
.dot{width:10px;height:10px;border-radius:50%}
.filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.fbtn{padding:4px 12px;border:1px solid #d0d0d0;border-radius:20px;background:transparent;font-size:12px;cursor:pointer;color:#888;transition:all .15s}
.fbtn.on{border-color:#D95218;color:#D95218;background:#fff5f2}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
thead th{padding:8px 10px;text-align:left;color:#999;font-weight:500;border-bottom:1px solid #e5e5e5;font-size:11px;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
thead th.tc{text-align:center}
tbody tr{border-bottom:1px solid #f0f0f0;transition:background .1s}
tbody tr:hover{background:#fafafa}
td{padding:9px 10px}
.tk{font-weight:600;font-size:13px}
.tk a{color:#D95218;text-decoration:none}
.tk a:hover{text-decoration:underline}
.tk span{color:#D95218}
.nm{color:#999;font-size:12px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#f5f5f5;color:#888}
.sc{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:500}
.sh{background:#EAF3DE;color:#3B6D11}
.sm{background:#FEF3D0;color:#92600A}
.sl{background:#FCEBEB;color:#A32D2D}
.tot{font-weight:600;font-size:14px}
.rk{color:#bbb;font-size:12px}
.badge{font-size:10px;background:#D95218;color:#fff;padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}
.upd{font-size:11px;color:#bbb;text-align:right;margin-top:1rem}
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" onclick="show('fii',this)">FIIs — Top 30</button>
  <button class="tab" onclick="show('ac',this)">Ações — Top 30</button>
</div>
<div class="legend">
  <span class="leg"><span class="dot" style="background:#639922"></span>8-10 alto</span>
  <span class="leg"><span class="dot" style="background:#BA7517"></span>5-7 médio</span>
  <span class="leg"><span class="dot" style="background:#E24B4A"></span>1-4 baixo</span>
</div>

<div id="fii-panel">
<div class="filters" id="fii-filters"></div>
<div class="tbl-wrap">
<table>
<thead><tr>
  <th class="rk">#</th><th>Ticker</th><th>Nome</th><th>Tipo</th>
  <th class="tc">Perene</th><th class="tc">Renda</th><th class="tc">Valor</th><th class="tc">Liq</th><th class="tc">Nota</th>
</tr></thead>
<tbody id="fii-body"></tbody>
</table>
</div>
</div>

<div id="ac-panel" style="display:none">
<div class="filters" id="ac-filters"></div>
<div class="tbl-wrap">
<table>
<thead><tr>
  <th class="rk">#</th><th>Ticker</th><th>Nome</th><th>Setor</th>
  <th class="tc">Perene</th><th class="tc">Renda</th><th class="tc">Valor</th><th class="tc">Liq</th><th class="tc">Nota</th>
</tr></thead>
<tbody id="ac-body"></tbody>
</table>
</div>
</div>

<div class="upd" id="upd-info"></div>

<script>
fetch('ranking.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('upd-info').textContent = 'Última atualização: ' + data.ultima_atualizacao + ' · Próxima: ' + data.proxima_atualizacao;
    buildFilters('fii', data.fiis, 'tipo');
    buildFilters('ac', data.acoes, 'setor');
    renderTable('fii-body', data.fiis, 'tipo');
    renderTable('ac-body', data.acoes, 'setor');
  });

function sc(v){ return v>=8?'sh':v>=5?'sm':'sl'; }

function renderTable(id, data, key) {
  const sorted = [...data].sort((a,b) => b.nota - a.nota);
  document.getElementById(id).innerHTML = sorted.map((d,i) => {
    const tick = d.post_url
      ? `<a href="${d.post_url}" target="_parent">${d.ticker}</a>`
      : `<span>${d.ticker}</span>`;
    const badge = d.post_url ? '<span class="badge">análise</span>' : '';
    return `<tr data-tipo="${d[key]}">
      <td class="rk">${i+1}</td>
      <td class="tk">${tick}${badge}</td>
      <td class="nm">${d.nome}</td>
      <td><span class="tag">${d[key]}</span></td>
      <td class="tc"><span class="sc ${sc(d.perene)}">${d.perene}</span></td>
      <td class="tc"><span class="sc ${sc(d.renda)}">${d.renda}</span></td>
      <td class="tc"><span class="sc ${sc(d.valorizacao)}">${d.valorizacao}</span></td>
      <td class="tc"><span class="sc ${sc(d.liquidez)}">${d.liquidez}</span></td>
      <td class="tc tot">${d.nota.toFixed(1)}</td>
    </tr>`;
  }).join('');
}

function buildFilters(panel, data, key) {
  const tipos = ['Todos', ...new Set(data.map(d => d[key]))];
  document.getElementById(panel+'-filters').innerHTML = tipos.map((t,i) =>
    `<button class="fbtn${i===0?' on':''}" onclick="filter('${panel}','${t}',this)">${t}</button>`
  ).join('');
}

function filter(panel, tipo, btn) {
  document.querySelectorAll('#'+panel+'-filters .fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  let n = 1;
  document.querySelectorAll('#'+panel+'-body tr').forEach(r => {
    const show = tipo === 'Todos' || r.dataset.tipo === tipo;
    r.style.display = show ? '' : 'none';
    if (show) r.querySelector('.rk').textContent = n++;
  });
}

function show(which, btn) {
  document.getElementById('fii-panel').style.display = which === 'fii' ? '' : 'none';
  document.getElementById('ac-panel').style.display = which === 'ac' ? '' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
